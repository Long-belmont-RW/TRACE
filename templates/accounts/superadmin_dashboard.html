<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superadmin Provisioning Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 2rem; }
        .container { background: #34495e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-width: 800px; margin: 0 auto; border-top: 4px solid #e74c3c; }
        h1 { color: #e74c3c; }
        .actions { margin-top: 2rem; display: flex; gap: 15px; }
        .btn { padding: 12px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .btn-admin { background: #e67e22; }
        .logout { display: inline-block; margin-top: 2rem; padding: 10px 15px; background: #c0392b; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Superadmin Provisioning Dashboard</h1>
        <p>Hello, {{ user.email }}. You are securely logged in as a <strong>Superadmin</strong>.</p>
        <p>This system strictly enforces invite-only registration. Use the tools below to provision new users and manage the TRACE platform.</p>
        
        <div class="actions">
            <a href="{% url 'admin:accounts_user_add' %}" class="btn">Add New User</a>
            <a href="{% url 'admin:index' %}" class="btn btn-admin">Advanced Admin Portal</a>
        </div>

        <a href="{% url 'two_factor:profile' %}" style="margin-right: 15px; display: inline-block; margin-top: 2rem; color: #3498db;">2FA Profile</a>
        <a href="{% url 'accounts:logout' %}" class="logout">Log Out</a>
    </div>
</body>
</html>
