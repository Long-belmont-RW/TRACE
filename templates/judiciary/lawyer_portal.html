<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lawyer Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f3; margin: 0; padding: 2rem; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; border-top: 4px solid #8e44ad; }
        h1 { color: #8e44ad; }
        .logout { display: inline-block; margin-top: 1rem; padding: 10px 15px; background: #e74c3c; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lawyer Portal</h1>
        <p>Hello, {{ user.email }}. You are logged in with the role: <strong>{{ user.role }}</strong></p>
        <p>Here you will be able to submit filings, request bail, and track your cases.</p>
        <a href="{% url 'two_factor:profile' %}" style="margin-right: 15px;">2FA Profile</a>
        <a href="{% url 'accounts:logout' %}" class="logout">Log Out</a>
    </div>
</body>
</html>
