{% extends 'judiciary/base_dashboard.html' %}

{% block title %}Decision Submitted - TRACE{% endblock %}

{% block dashboard_content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 mt-12">
    <div class="max-w-md w-full space-y-8 bg-surface-container-lowest p-10 rounded-2xl shadow-sm border border-outline-variant text-center">
        <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-emerald-50 text-emerald-600 mb-6 border border-emerald-100">
            <span class="material-symbols-outlined !text-5xl">task_alt</span>
        </div>
        
        <h2 class="mt-2 font-headline-md text-headline-md text-primary tracking-tight">
            Decision Submitted!
        </h2>
        
        <p class="mt-4 font-body-md text-body-md text-on-surface-variant">
            The hearing log has been recorded and the case status has been updated successfully.
        </p>
        
        <div class="mt-8">
            <a href="{% url 'judiciary:clerk_dashboard' %}" class="w-full flex justify-center py-3 px-4 rounded-md shadow-sm font-label-md text-label-md text-white bg-primary hover:bg-primary-container transition-colors uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
